<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemBag - Sistema de Inventário Avançado</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --grid-bg: #1e293b;
            --grid-border: #334155;
            --item-border: #94a3b8;
            --accent: #10b981;
            --accent-hover: #059669;
            --error: #ef4444;
            --text-main: #f8fafc;
            --cell-size: 60px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 { margin-bottom: 5px; font-size: 2rem; text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); letter-spacing: 1px; }
        p.subtitle { color: #94a3b8; margin-bottom: 20px; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button {
            background-color: #334155;
            color: white;
            border: 1px solid #475569;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover { background-color: var(--accent); border-color: var(--accent-hover); }
        button.active { background-color: var(--accent); box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        #game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            position: relative;
            width: 100%;
            max-width: 1000px;
        }

        /* O Grid da Mochila */
        #backpack-container {
            position: relative;
            background-color: var(--grid-bg);
            border: 4px solid #475569;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.8);
            /* O tamanho será definido via JS */
        }

        .grid-cell {
            position: absolute;
            width: var(--cell-size);
            height: var(--cell-size);
            border: 1px dashed rgba(255,255,255,0.1);
            pointer-events: none;
        }

        /* Área de Itens Fora da Mochila */
        #inventory-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            padding: 20px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 12px;
            border: 1px dashed #334155;
            min-height: 150px;
            width: 100%;
        }

        /* Estilo dos Itens */
        .item {
            position: absolute;
            background-size: cover;
            background-position: center;
            border: 2px solid var(--item-border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            cursor: grab;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
            touch-action: none; /* Previne scroll ao arrastar no mobile */
        }
        
        .item:active { cursor: grabbing; transform: scale(1.02); z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .item.rotating { transition: width 0.2s, height 0.2s; }
        
        .item-content {
            text-align: center;
            pointer-events: none;
            padding: 5px;
            background: rgba(0,0,0,0.4);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Feedback Visual */
        .highlight-valid { background-color: rgba(16, 185, 129, 0.3) !important; border-color: var(--accent) !important; }
        .highlight-invalid { background-color: rgba(239, 68, 68, 0.3) !important; border-color: var(--error) !important; }
        
        /* Instruções */
        .instructions {
            margin-top: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            max-width: 600px;
        }
        .instructions kbd {
            background: #334155;
            padding: 2px 6px;
            border-radius: 3px;
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>RemBag OS</h1>
    <p class="subtitle">Gestão de Inventário Espacial</p>

    <div class="controls">
        <button id="btn-lvl1" onclick="loadLevel(1)">Nível 1 (Básico)</button>
        <button id="btn-lvl2" onclick="loadLevel(2)">Nível 2 (Intermediário)</button>
        <button id="btn-lvl3" onclick="loadLevel(3)">Nível 3 (Expert)</button>
    </div>

    <div id="game-area">
        <div id="backpack-container"></div>
        <div id="inventory-pool"></div>
    </div>

    <div class="instructions">
        <p>Arraste os itens para a mochila. Pressione <kbd>R</kbd> ou <b>Duplo Clique</b> enquanto segura o item para rotacioná-lo.</p>
        <p>Organize todos os itens para completar o nível!</p>
    </div>

<script>
    // Configurações Globais
    const CELL_SIZE = 60;
    
    // Base de Dados de Itens (Tamanhos e Cores)
    const ITEM_DB = {
        'chaves': { name: 'Chaves', w: 1, h: 1, color: '#b45309' },
        'fone': { name: 'Fones', w: 1, h: 1, color: '#1e40af' },
        'estojo': { name: 'Estojo', w: 2, h: 1, color: '#047857' },
        'carteira': { name: 'Carteira', w: 2, h: 1, color: '#be123c' },
        'carregador': { name: 'Carregador', w: 1, h: 2, color: '#4338ca' },
        'manga': { name: 'Mangá Vol.1', w: 1, h: 2, color: '#86198f' },
        'livro': { name: 'Livro', w: 2, h: 2, color: '#0f766e' },
        'garrafa': { name: 'Garrafa', w: 1, h: 3, color: '#0369a1' },
        'notebook': { name: 'Notebook', w: 3, h: 2, color: '#334155' },
        'arcade': { name: 'Controle Arcade', w: 2, h: 2, color: '#b91c1c' },
        'guarda_chuva': { name: 'Guarda-chuva', w: 1, h: 4, color: '#1d4ed8' },
        'moletom': { name: 'Moletom Dark', w: 3, h: 3, color: '#0f172a' }
    };

    // Definição dos Níveis
    const LEVELS = {
        1: { cols: 4, rows: 4, items: ['fone', 'chaves', 'carteira', 'livro', 'carregador'] },
        2: { cols: 6, rows: 5, items: ['garrafa', 'estojo', 'notebook', 'manga', 'carregador', 'chaves', 'fone'] },
        3: { cols: 8, rows: 7, items: ['notebook', 'livro', 'carregador', 'estojo', 'fone', 'garrafa', 'guarda_chuva', 'carteira', 'moletom', 'arcade'] }
    };

    // Variáveis de Estado
    let currentGrid = [];
    let currentCols = 0;
    let currentRows = 0;
    let draggedItem = null;
    let offsetX = 0;
    let offsetY = 0;
    let originalParent = null;
    let itemsInBag = 0;
    let totalLevelItems = 0;

    // Elementos DOM
    const backpack = document.getElementById('backpack-container');
    const pool = document.getElementById('inventory-pool');

    // Contexto de Áudio para SFX (Sons sintéticos para não precisar de arquivos externos)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'grab') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'drop') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'error') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'success') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.setValueAtTime(400, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }
    }

    function initGrid(cols, rows) {
        backpack.innerHTML = '';
        currentCols = cols;
        currentRows = rows;
        backpack.style.width = `${cols * CELL_SIZE}px`;
        backpack.style.height = `${rows * CELL_SIZE}px`;
        
        currentGrid = Array(rows).fill().map(() => Array(cols).fill(null));

        // Desenhar linhas guia visuais
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.style.left = `${c * CELL_SIZE}px`;
                cell.style.top = `${r * CELL_SIZE}px`;
                backpack.appendChild(cell);
            }
        }
    }

    function createItemElement(id) {
        const data = ITEM_DB[id];
        const el = document.createElement('div');
        el.className = 'item';
        el.id = `item-${Math.random().toString(36).substr(2, 9)}`;
        el.dataset.w = data.w;
        el.dataset.h = data.h;
        el.dataset.originalId = id;
        
        el.style.width = `${data.w * CELL_SIZE}px`;
        el.style.height = `${data.h * CELL_SIZE}px`;
        el.style.backgroundColor = data.color;
        
        el.innerHTML = `<div class="item-content">${data.name}</div>`;
        
        // Posicionamento relativo para o pool
        el.style.position = 'relative'; 

        // Eventos de Drag
        el.addEventListener('pointerdown', handlePointerDown);
        
        return el;
    }

    function loadLevel(lvl) {
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-lvl${lvl}`).classList.add('active');
        
        const config = LEVELS[lvl];
        initGrid(config.cols, config.rows);
        pool.innerHTML = '';
        itemsInBag = 0;
        totalLevelItems = config.items.length;

        config.items.forEach(itemId => {
            const el = createItemElement(itemId);
            pool.appendChild(el);
        });
    }

    // Lógica de Drag and Drop Personalizada
    function handlePointerDown(e) {
        if (e.button !== 0 && e.button !== undefined) return; // Apenas clique esquerdo
        
        draggedItem = e.currentTarget;
        originalParent = draggedItem.parentNode;
        
        playSound('grab');
        
        // Se estava na mochila, remover do grid matricial
        if (originalParent === backpack) {
            removeFromGrid(draggedItem);
            itemsInBag--;
        }

        const rect = draggedItem.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;

        // Mudar para o body para arrastar livremente por cima de tudo
        draggedItem.style.position = 'absolute';
        draggedItem.style.zIndex = 1000;
        document.body.appendChild(draggedItem);
        
        moveItem(e.clientX, e.clientY);

        document.addEventListener('pointermove', handlePointerMove);
        document.addEventListener('pointerup', handlePointerUp);
        
        // Atalho de rotação
        document.addEventListener('keydown', handleKeyDown);
        draggedItem.addEventListener('dblclick', rotateItem);
    }

    function moveItem(clientX, clientY) {
        if (!draggedItem) return;
        draggedItem.style.left = `${clientX - offsetX}px`;
        draggedItem.style.top = `${clientY - offsetY}px`;

        checkHoverTarget(clientX, clientY);
    }

    function handlePointerMove(e) {
        moveItem(e.clientX, e.clientY);
    }

    function handleKeyDown(e) {
        if (e.key.toLowerCase() === 'r' && draggedItem) {
            rotateItem(e);
        }
    }

    function rotateItem(e) {
        e.preventDefault();
        const w = parseInt(draggedItem.dataset.w);
        const h = parseInt(draggedItem.dataset.h);
        
        draggedItem.dataset.w = h;
        draggedItem.dataset.h = w;
        
        draggedItem.style.width = `${h * CELL_SIZE}px`;
        draggedItem.style.height = `${w * CELL_SIZE}px`;
        
        // Ajustar offset para manter sob o mouse
        offsetX = (offsetX / (w * CELL_SIZE)) * (h * CELL_SIZE);
        offsetY = (offsetY / (h * CELL_SIZE)) * (w * CELL_SIZE);
        
        playSound('grab');
        if (e.clientX) checkHoverTarget(e.clientX, e.clientY);
    }

    function checkHoverTarget(x, y) {
        draggedItem.classList.remove('highlight-valid', 'highlight-invalid');
        
        const bpRect = backpack.getBoundingClientRect();
        const w = parseInt(draggedItem.dataset.w);
        const h = parseInt(draggedItem.dataset.h);
        
        // Centro do item arrastado
        const itemCenterX = x - offsetX + (w * CELL_SIZE)/2;
        const itemCenterY = y - offsetY + (h * CELL_SIZE)/2;

        if (itemCenterX >= bpRect.left && itemCenterX <= bpRect.right &&
            itemCenterY >= bpRect.top && itemCenterY <= bpRect.bottom) {
            
            // Calcular célula alvo baseado no top-left do item relativo à mochila
            const relX = x - offsetX - bpRect.left;
            const relY = y - offsetY - bpRect.top;
            
            const gridX = Math.round(relX / CELL_SIZE);
            const gridY = Math.round(relY / CELL_SIZE);

            if (canPlaceInGrid(gridX, gridY, w, h)) {
                draggedItem.classList.add('highlight-valid');
            } else {
                draggedItem.classList.add('highlight-invalid');
            }
        }
    }

    function handlePointerUp(e) {
        document.removeEventListener('pointermove', handlePointerMove);
        document.removeEventListener('pointerup', handlePointerUp);
        document.removeEventListener('keydown', handleKeyDown);
        draggedItem.removeEventListener('dblclick', rotateItem);

        draggedItem.classList.remove('highlight-valid', 'highlight-invalid');
        draggedItem.style.zIndex = '';

        const bpRect = backpack.getBoundingClientRect();
        const w = parseInt(draggedItem.dataset.w);
        const h = parseInt(draggedItem.dataset.h);
        
        const relX = e.clientX - offsetX - bpRect.left;
        const relY = e.clientY - offsetY - bpRect.top;
        
        const gridX = Math.round(relX / CELL_SIZE);
        const gridY = Math.round(relY / CELL_SIZE);

        if (canPlaceInGrid(gridX, gridY, w, h) && 
            e.clientX >= bpRect.left && e.clientX <= bpRect.right &&
            e.clientY >= bpRect.top && e.clientY <= bpRect.bottom) {
            
            // Soltar na Mochila
            placeInGrid(draggedItem, gridX, gridY, w, h);
            playSound('drop');
            itemsInBag++;
            
            checkWinCondition();
        } else {
            // Devolver para o Pool
            returnToPool(draggedItem);
            playSound('error');
        }

        draggedItem = null;
    }

    function canPlaceInGrid(x, y, w, h) {
        if (x < 0 || y < 0 || x + w > currentCols || y + h > currentRows) return false;
        
        for (let r = y; r < y + h; r++) {
            for (let c = x; c < x + w; c++) {
                if (currentGrid[r][c] !== null) return false;
            }
        }
        return true;
    }

    function placeInGrid(item, x, y, w, h) {
        backpack.appendChild(item);
        item.style.position = 'absolute';
        item.style.left = `${x * CELL_SIZE}px`;
        item.style.top = `${y * CELL_SIZE}px`;
        item.dataset.gridX = x;
        item.dataset.gridY = y;

        for (let r = y; r < y + h; r++) {
            for (let c = x; c < x + w; c++) {
                currentGrid[r][c] = item.id;
            }
        }
    }

    function removeFromGrid(item) {
        const x = parseInt(item.dataset.gridX);
        const y = parseInt(item.dataset.gridY);
        const w = parseInt(item.dataset.w);
        const h = parseInt(item.dataset.h);

        if (!isNaN(x) && !isNaN(y)) {
            for (let r = y; r < y + h; r++) {
                for (let c = x; c < x + w; c++) {
                    currentGrid[r][c] = null;
                }
            }
        }
        delete item.dataset.gridX;
        delete item.dataset.gridY;
    }

    function returnToPool(item) {
        pool.appendChild(item);
        item.style.position = 'relative';
        item.style.left = '0';
        item.style.top = '0';
        
        // Resetar rotação caso tenha sido rotacionado no ar
        const origId = item.dataset.originalId;
        const data = ITEM_DB[origId];
        item.dataset.w = data.w;
        item.dataset.h = data.h;
        item.style.width = `${data.w * CELL_SIZE}px`;
        item.style.height = `${data.h * CELL_SIZE}px`;
    }

    function checkWinCondition() {
        if (itemsInBag === totalLevelItems) {
            setTimeout(() => {
                playSound('success');
                alert('SISTEMA: Inventário Otimizado com Sucesso! 🎒✨\n\nVocê acomodou todos os itens perfeitamente.');
            }, 300);
        }
    }

    // Iniciar o jogo no Nível 1
    window.onload = () => loadLevel(1);

    // Evitar menu de contexto no clique direito para não bugar o drag
    document.addEventListener('contextmenu', e => e.preventDefault());

</script>
</body>
</html>
