<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBag | Protótipo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>SmartBag</h1>
            <p>Sua mochila, agora inteligente.</p>
        </header>

        <section class="stats-panel">
            <div class="progress-bar-bg"><div id="progress-bar"></div></div>
            <p id="stats-text">Itens: 0/7 | Faltando: 7</p>
        </section>

        <div id="checklist" class="checklist-grid"></div>

        <div class="actions">
            <button id="btn-check" class="btn-primary">Verificar Mochila</button>
            <button id="btn-sensor" class="btn-secondary">Simular Sensor</button>
            <button id="btn-clear" class="btn-ghost">Limpar</button>
        </div>

        <div id="result-alert" class="alert hidden">
            <span id="alert-icon"></span>
            <p id="alert-message"></p>
        </div>

        <section class="history-section">
            <h3>Histórico de Verificações</h3>
            <ul id="history-list"></ul>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
