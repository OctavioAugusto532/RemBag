<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBag | Mochila Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <h1>Mochila Anti-Esquecimento</h1>
            <p>Seu assistente pessoal de organização.</p>
        </header>

        <section class="stats-dashboard">
            <div class="progress-wrapper">
                <div id="progress-bar" class="progress-fill"></div>
            </div>
            <div id="stats-text" class="stats-counter">0% concluído</div>
        </section>

        <section class="checklist" id="checklist"></section>

        <div class="actions">
            <button id="btn-check" class="btn-main">Verificar Mochila</button>
            <button id="btn-sensor" class="btn-secondary">Simular Sensor</button>
            <button id="btn-clear" class="btn-ghost">Limpar Tudo</button>
        </div>

        <div id="result-box" class="result-box hidden">
            <div id="result-content"></div>
        </div>

        <section class="history-section">
            <h3>Últimos Registros</h3>
            <ul id="history-list"></ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
